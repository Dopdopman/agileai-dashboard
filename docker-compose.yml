version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-agile-dashboard-super-secret-key}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      - db
      - ai-service

  ai-service:
    build:
      context: .
      dockerfile: Dockerfile.ai
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=agile_user
      - POSTGRES_PASSWORD=agile_password
      - POSTGRES_DB=agile_dashboard
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
